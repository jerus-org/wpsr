version: 2.1

parameters:
  wpsr_version:
    type: string
    default: ""
    description: "Override wpsr crate version (empty = nextsv auto-detect)"
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: jerus-org/circleci-toolkit@4.7.2

jobs:
  tools:
    executor: toolkit/rust_env_rolling
    steps:
      - run:
          name: Verify tools
          command: |
            set -ex
            nextsv --version
            pcu --version
            cargo release --version

workflows:
  release:
    jobs:
      - tools

      - toolkit/calculate_versions:
          name: calculate-versions
          requires: [tools]
          crates: "wpsr:wpsr-v"
          crate_version_overrides: "wpsr:<< pipeline.parameters.wpsr_version >>"
          workspace_version_override: << pipeline.parameters.workspace_version >>

      - approve-release:
          type: approval
          requires: [calculate-versions]

      - toolkit/release_crate:
          name: release-wpsr
          requires: [approve-release]
          package: wpsr
          crate_tag_prefix: wpsr-v
          context:
            - release
            - bot-check
            - pcu-app

      - toolkit/release_prlog:
          requires: [release-wpsr]
          context:
            - release
            - bot-check
            - pcu-app
